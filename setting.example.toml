[llm]
base_url = "https://api.example.com/v1"
api_key = "YOUR_API_KEY"
model = "example-model"
timeout = 600
# 可选：透传给模型服务请求体的额外 JSON 参数。
# 当前流程需要完整 JSON 响应后再检查并保存译文，因此不支持 stream=true 或 stream_options。
# request_body_extra = '''
# {
#   "reasoning_effort": "high",
#   "thinking": {"type": "enabled"}
# }
# '''

[runtime]
# auto 使用 Rust 原生核心默认线程数；也可以改成正整数，例如 4。
rust_threads = "auto"

[debug]
# debug 总开关；CLI --debug/--no-debug 可按单次运行覆盖。
enabled = false

[debug.logging]
enabled = true
console_level = "DEBUG"
file_level = "DEBUG"

[debug.timings]
enabled = true
write_file = true
include_summary_in_report = true
detail_level = "standard"

[translation_context]
token_size = 1024
factor = 3.5
max_command_items = 5

[text_translation]
worker_count = 200
rpm = 200
retry_count = 3
retry_delay = 2
include_source_lines = false
# 自定义提示词可包含 `{{输出字段列表}}`、`{{原文对照规则}}`、`{{原文对照示例行}}` 三个模板占位符来控制输出协议位置；不包含时程序会在末尾自动追加本轮输出协议。
# 默认不要求模型输出原文对照，排障时可改为 true 或在命令行临时传 `--include-source-lines`。
# 注册游戏时必须显式使用 `add-game --source-language ja|en`；运行时按注册源语言从下表选择提示词。

[text_translation.system_prompt_files]
ja = "prompts/text_translation_ja_to_zh_system.md"
en = "prompts/text_translation_en_to_zh_system.md"

[event_command_text.default_command_codes_by_engine]
mv = [356]
mz = [357]

[write_back]
# 仅在 CLI 显式传入 --confirm-font-overwrite 时使用；普通写回不会覆盖字体引用。
replacement_font_path = "fonts/NotoSansSC-Regular.ttf"

[text_rules]
# 正则引擎契约：
# line_width_count_pattern、source_residual_segment_pattern、residual_escape_sequence_pattern
# 会进入 Rust 原生检查，必须同时兼容 Python re 与 Rust regex。
# source_text_required_pattern 当前只在 Python 侧使用，只承诺 Python re。
strip_wrapping_punctuation_pairs = [["「", "」"]]
preserve_wrapping_punctuation_pairs = [["「", "」"], ["『", "』"], ["（", "）"]]
line_split_punctuations = [
  "，", "。", "、", "；", "：", "！", "？", "…", "～", "—", "♪", "♡",
  "）", "】", "」", "』", ",", ".", ";", ":", "!", "?",
]
long_text_line_width_limit = 26
line_width_count_pattern = "\\S"
# 源语言识别和源文残留规则会按游戏注册时的 source_language 自动套用。
source_residual_allowed_chars = ["っ", "ッ", "ー", "・", "。", "～", "…"]
source_residual_allowed_tail_chars = ["あ", "い", "う", "え", "お", "っ", "ッ", "ん", "ー", "よ", "ね", "な", "か"]
source_text_required_pattern = "[\\u3040-\\u309F\\u30A0-\\u30FF\\u3400-\\u4DBF\\u4E00-\\u9FFF\\uF900-\\uFAFF]+"
source_text_exclusion_profile = "none"
source_residual_segment_pattern = "[\\u3040-\\u309F\\u30A0-\\u30FF]+"
source_residual_terms_ignore_case = false
source_residual_detection_profile = "japanese_strict"
# 英文语言档案会覆盖为 english_source_copy，只报告译文连续复制当前原文的大段英文。
english_source_copy_min_words = 4
english_source_copy_min_letters = 12
residual_escape_sequence_pattern = "\\\\[nrt]"
