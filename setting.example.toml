[llm]
# 这是什么：不传 --llm-client 时默认使用哪个模型客户端。
# 有什么作用：日常翻译不用每次手动选择客户端。
# 填写建议：必须和下面某个 [[llm.clients]] 的 name 完全一致。
default_client = "default-openai"

[[llm.clients]]
# 这是什么：模型客户端名称。
# 有什么作用：执行 translate、run-all 或 doctor 时，可以用 --llm-client 选择它。
# 填写建议：只使用小写字母、数字、短横线和下划线，例如 deepseek-chat。
name = "default-openai"

# 这是什么：提供商类型。
# 有什么作用：决定程序按哪种协议调用模型服务。
# 填写建议：当前只支持 openai，表示 OpenAI 兼容接口。
provider_type = "openai"

# 这是什么：当前客户端的模型服务地址，一般由你的 API 服务商提供。
# 有什么作用：程序会把待翻译文本发送到这个地址。
# 填写建议：OpenAI 兼容服务通常以 /v1 结尾；不知道填什么时，把服务商名称交给 Agent 帮你查。
base_url = "https://api.example.com/v1"

# 这是什么：当前客户端的 API Key，也就是访问模型服务的钥匙。
# 有什么作用：证明这次请求是你本人授权的。
# 填写建议：不要发给陌生人，也不要贴到公开网页或截图里。
api_key = "YOUR_API_KEY"

# 这是什么：当前客户端要调用的模型名称。
# 有什么作用：决定实际由哪个模型负责翻译。
# 填写建议：必须和服务商文档里的模型名一致，大小写也要照抄。
model = "example-model"

# 这是什么：当前客户端单次模型请求最多等待多少秒。
# 有什么作用：网络慢、文本批次较大时，给模型更多时间完成返回。
# 什么时候调大：经常出现请求超时，但稍后重试又能成功时。
timeout = 600

# 这是什么：当前客户端额外发送给模型服务的 JSON 参数，高级用户才需要。
# 有什么作用：少数模型服务会用它控制推理强度、思考模式或输出长度。
# 什么时候开启：只有服务商文档明确要求，或 Agent 根据你的服务商建议时再打开。
# 注意：当前流程必须先拿到完整 JSON 译文再检查保存，所以不支持 stream=true。
# request_body_extra = '''
# {
#   "reasoning_effort": "high",
#   "thinking": {"type": "enabled"}
# }
# '''


[runtime]
# 这是什么：Rust 原生核心使用多少线程处理重活。
# 有什么作用：影响扫描、检查和写回计划等本地处理速度，也会影响电脑占用。
# 填写建议：保持 auto 即可；电脑明显卡顿时可改成 4 或 8。
rust_threads = "auto"


[debug]
# 这是什么：排障模式总开关。
# 有什么作用：开启后会记录更详细的运行日志、耗时和模型消息，方便定位问题。
# 什么时候开启：命令报错、速度异常、译文格式异常，且需要把线索交给 Agent 排查时。
enabled = false


[debug.logging]
# 这是什么：debug 模式下的详细日志开关。
# 有什么作用：把更多运行细节写到终端和日志文件里。
# 填写建议：平时不用改；开启 debug 后保持 true 最方便排障。
enabled = true

# 这是什么：终端显示的最低日志级别。
# 有什么作用：DEBUG 最详细，INFO 更安静，ERROR 只看错误。
console_level = "DEBUG"

# 这是什么：日志文件保存的最低日志级别。
# 有什么作用：文件里保留更完整线索，方便事后查看。
file_level = "DEBUG"


[debug.timings]
# 这是什么：debug 模式下的耗时记录。
# 有什么作用：告诉你每个阶段花了多久，用来判断慢在哪里。
# 什么时候开启：命令变慢、扫描卡住、写回耗时异常时。
enabled = true

# 这是什么：是否写出完整耗时 JSON 文件。
# 有什么作用：保留可复查的详细耗时数据。
write_file = true

# 这是什么：是否在命令输出里附带简短耗时摘要。
# 有什么作用：不用打开文件，也能快速看到主要耗时。
include_summary_in_report = true

# 这是什么：耗时明细程度。
# 填写建议：目前只支持 standard，保持默认即可。
detail_level = "standard"


[debug.llm_messages]
# 这是什么：debug 模式下保存发给模型和模型返回的消息。
# 有什么作用：用于检查提示词、输入文本和模型输出是否符合预期。
# 什么时候开启：译文 JSON 格式反复不对、模型漏翻、提示词疑似不生效时。
enabled = true

# 这是什么：模型消息保存目录。
# 有什么作用：debug 时会把相关文件写到这里。
output_dir = "output/debug/llm-messages"


[translation_context]
# 这是什么：每批发给模型的目标文本量，单位近似为 token。
# 有什么作用：数值越大，每次模型看到的上下文越多，但也更容易变慢或超限。
# 什么时候调小：模型报上下文太长、输出 JSON 变乱、单批等待太久时。
token_size = 1024

# 这是什么：把字符数量粗略换算成 token 的系数。
# 有什么作用：帮助程序估算一批文本有多大；它不是收费倍率。
# 填写建议：不确定就保持默认。
factor = 3.5

# 这是什么：同一角色的连续台词最多额外带几条。
# 有什么作用：让模型保留对话上下文，减少称呼、语气和前后句断裂。
# 什么时候调小：单批太长或模型经常输出格式错误时。
max_command_items = 5


[text_translation]
# 这是什么：同时发送多少个翻译任务。
# 有什么作用：数值越高，跑得可能越快，也越容易触发服务商限速。
# 什么时候调低：出现 429、限流、网络错误增多，或电脑/网络明显吃紧时。
worker_count = 200

# 这是什么：每分钟最多发送多少次模型请求。
# 有什么作用：主动控制请求速度，避免超过服务商限制。
# 什么时候调低：服务商有明确 RPM 限制，或经常报“请求过快”时。
rpm = 200

# 这是什么：遇到可恢复错误时最多重试几次。
# 有什么作用：临时网络抖动或服务繁忙时，程序会自动再试。
# 填写建议：保持 3 通常比较稳。
retry_count = 3

# 这是什么：每次重试前等待多少秒。
# 有什么作用：给网络或模型服务一点恢复时间。
# 什么时候调大：服务商限流严格，短时间重试仍然失败时。
retry_delay = 2

# 这是什么：是否要求模型在输出里附带原文对照。
# 有什么作用：方便人工排查每条译文对应哪句原文，但会增加输出长度。
# 什么时候开启：只建议排障或人工审校时临时开启；正常批量翻译保持 false。
include_source_lines = false


[text_translation.system_prompt_files]
# 这是什么：不同源语言使用的系统提示词文件。
# 有什么作用：注册游戏源语言为 ja 或 en 后，程序会自动选对应提示词。
# 什么时候修改：只有你准备使用自定义提示词文件时再改路径。
ja = "prompts/text_translation_ja_to_zh_system.md"
en = "prompts/text_translation_en_to_zh_system.md"


[event_command_text.default_command_codes_by_engine]
# 这是什么：RPG Maker 事件指令里，哪些指令编号默认可能包含文本参数。
# 有什么作用：帮助程序找到插件命令或事件参数里的可翻译文本。
# 什么时候修改：只有确认某个游戏的插件命令文本漏扫，且规则说明要求修改时。
mv = [356]
mz = [357]


[write_back]
# 这是什么：写回时可选的候选中文字体文件。
# 有什么作用：只有你在命令里明确确认覆盖字体时，才会用它替换游戏字体引用。
# 什么时候修改：游戏写回后中文显示成方块，且你已经准备好要替换的字体文件时。
replacement_font_path = "fonts/NotoSansSC-Regular.ttf"


[text_rules]
# 这是什么：文本提取、断行和质量检查规则。
# 有什么作用：决定哪些文本需要翻译、长句如何换行、译文是否残留原语言。
# 填写建议：普通用户保持默认；只有排查误报、漏翻或显示挤出窗口时再改。

# 提取时临时去掉外层成对标点，减少模型把外框也处理乱。
strip_wrapping_punctuation_pairs = [["「", "」"]]

# 译文必须保留的外层成对标点；用于检查译文形状是否和原文一致。
preserve_wrapping_punctuation_pairs = [["「", "」"], ["『", "』"], ["（", "）"]]

# 长文本自动分行时优先寻找的断句标点。
# 什么时候修改：游戏窗口太窄、文本换行不自然，且你知道想在哪些符号处分行时。
line_split_punctuations = [
  "，", "。", "、", "；", "：", "！", "？", "…", "～", "—", "♪", "♡",
  "）", "】", "」", "』", ",", ".", ";", ":", "!", "?",
]

# 这是什么：一行文本的建议宽度。
# 有什么作用：超过后会更积极地尝试分行，避免文字挤出对话框。
# 什么时候调整：写回试玩后发现文字经常超框；数值越小，换行越多。
long_text_line_width_limit = 26

# 这是什么：哪些字符计入“行宽”。
# 有什么作用：默认所有非空白字符都算宽度。
# 填写建议：这是 PCRE2 正则规则，不懂正则请不要改。
line_width_count_pattern = "\\S"

# 下面是源语言识别和残留检查规则，正则字段统一使用 PCRE2 当前契约。
# 它们会按注册游戏时选择的源语言自动套用；普通用户不要手动修改。

# 哪些字符表示“这段文本可能需要翻译”。
source_text_required_pattern = "[ぁ-んァ-ヶ一-龯ー]+"

# 源语言识别时要排除的噪声档案；none 表示不额外排除。
source_text_exclusion_profile = "none"

# 译文中哪些片段会被当作疑似残留源语言。
source_residual_segment_pattern = "[ぁ-んァ-ヶー]+"

# 残留检查里允许出现的少量字符，例如日文长音或语气残留。
source_residual_allowed_chars = ["っ", "ッ", "ー", "・", "。", "～", "…"]

# 残留检查里允许出现在词尾的少量字符，主要减少日文语气词误报。
source_residual_allowed_tail_chars = ["あ", "い", "う", "え", "お", "っ", "ッ", "ん", "ー", "よ", "ね", "な", "か"]

# 是否忽略大小写比较允许残留词；英文档案会自动开启。
source_residual_terms_ignore_case = false

# 残留检查策略；日文默认严格检查，英文档案会自动改为英文复制检查。
source_residual_detection_profile = "japanese_strict"

# 英文游戏专用：连续复制多少个英文词后，判定为可能漏翻。
english_source_copy_min_words = 4

# 英文游戏专用：连续复制多少个英文字母后，判定为可能漏翻。
english_source_copy_min_letters = 12

# 这是什么：游戏控制符里的转义序列检查，例如 \n、\t。
# 有什么作用：避免把这些必须原样保留的符号误判成普通文本。
# 填写建议：这是 PCRE2 正则规则，不懂正则请不要改。
residual_escape_sequence_pattern = "\\\\[nrt]"
