name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "发布标签，例如 v0.1.0"
        required: true
        type: string
      prerelease:
        description: "标记为预发布"
        required: false
        default: false
        type: boolean
      draft:
        description: "创建为草稿"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows release
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "缺少发布标签"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "zip_name=att-mz-windows-x86_64.zip" >> $env:GITHUB_OUTPUT
          "release_notes=dist/release-notes.md" >> $env:GITHUB_OUTPUT

      - name: Prepare release notes
        shell: pwsh
        run: python scripts/extract_release_notes.py --tag "${{ steps.meta.outputs.tag }}" --output "${{ steps.meta.outputs.release_notes }}"

      - name: Install project dependencies
        shell: pwsh
        run: uv sync --locked --dev

      - name: Type check
        shell: pwsh
        run: uv run basedpyright

      - name: Full Python tests
        shell: pwsh
        env:
          ATT_MZ_RUST_THREADS: "1"
        run: uv run pytest -q -n 8 --durations=30 --durations-min=0.5

      - name: Rust fmt
        shell: pwsh
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Rust clippy
        shell: pwsh
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

      - name: Rust test
        shell: pwsh
        run: cargo test --manifest-path rust/Cargo.toml

      - name: Build release zip
        shell: pwsh
        run: uv run python scripts/build_release.py --zip-name "${{ steps.meta.outputs.zip_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.zip_name }}
          path: dist/${{ steps.meta.outputs.zip_name }}
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: A.T.T MZ ${{ steps.meta.outputs.tag }}
          files: dist/${{ steps.meta.outputs.zip_name }}
          body_path: ${{ steps.meta.outputs.release_notes }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
