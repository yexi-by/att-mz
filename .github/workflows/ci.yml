name: ci

on:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"

permissions:
  contents: read

jobs:
  python:
    name: Python validation
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      ATT_MZ_RUST_THREADS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install project dependencies
        shell: pwsh
        run: uv sync --locked --dev

      - name: Type check
        shell: pwsh
        run: uv run basedpyright

      - name: Full Python tests
        shell: pwsh
        run: uv run pytest -q -n 12 --durations=30 --durations-min=0.5
